<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Skill Issue makes coding-agent skill behavior observable, attributable, and actionable."
    />
    <script>
      (() => {
        const storedTheme = localStorage.getItem('skill-issue-theme');
        const systemTheme = matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
        document.documentElement.dataset.theme = storedTheme || systemTheme;
      })();
    </script>
    <title>Skill Issue — Agent skill evaluations</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
