<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Service overview</title>

      .status { width: 0.75rem; height: 0.75rem; border-radius: 50%; display: inline-block; }
      .good { background: #24a148; }
      .bad { background: #da1e28; }
    </style>

  <body>

    <button aria-label="View Search details">View Search details</button>
    <button aria-label="View Payments details">View Payments details</button>
  </body>
</html>
