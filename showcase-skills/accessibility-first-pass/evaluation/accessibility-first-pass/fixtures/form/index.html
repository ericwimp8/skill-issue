<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Create account</title>
    <style>
      body { color: #aaa; background: #fff; font-family: sans-serif; }
      .error { color: #d00; }
      .submit { background: #246; color: white; padding: 0.75rem; width: 8rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Create account</h1>
      <label>Email address</label>

      <div class="submit" onclick="location.hash='submitted'">Continue</div>
    </main>
  </body>
</html>
