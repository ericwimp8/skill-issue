<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account request</title>
    <style>
      body { font-family: sans-serif; color: #777; background: #fff; }
      .submit { background: #2457d6; color: #fff; padding: 0.35rem 0.55rem; }
      .error { color: #d11; }
    </style>
  </head>
  <body>
    <main>
      <h1>Request an account</h1>
      <form>
        <input id="email" name="email" placeholder="Email address" required />
        <span class="error">Invalid value</span>
        <div class="submit" onclick="document.querySelector('form').submit()">Send request</div>
      </form>
    </main>
  </body>
</html>
