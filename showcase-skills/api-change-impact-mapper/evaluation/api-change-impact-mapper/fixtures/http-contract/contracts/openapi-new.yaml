openapi: 3.0.3
paths:
  /accounts/{id}:
    get:
      responses:
        '200':
          {
            description: Account or null,
            content:
              {
                application/json:
                  {
                    schema:
                      {
                        oneOf:
                          [
                            { $ref: '#/components/schemas/Account' },
                            { type: 'null' },
                          ],
                      },
                  },
              },
          }
components:
  schemas:
    Account:
      type: object
      required: [id, profile, status]
      properties:
        id: { type: string }
        profile:
          type: object
          required: [label]
          properties: { label: { type: string } }
        status: { type: string, enum: [active, suspended] }
